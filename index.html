<!DOCTYPE html>
<html>
<head>
  <title>Saikat Sarkar Shraban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <h2>Saikat Sarkar Shraban</h2>
  <div>
    <button onclick="showTab('overview')">Overview</button>
    <button onclick="showTab('publications')">Publications</button>
  </div>
</header>

<div id="overview" class="tab active"></div>
<div id="publications" class="tab"></div>

<script>
let data;

fetch('cv.json')
.then(res => res.json())
.then(d => {
  data = d;
  loadOverview();
  loadPublications();
});

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

function loadOverview() {
  let html = `
    <div class="container">
      <div class="left">
        <h1>${data.name}</h1>
        <p>${data.email}</p>
        <p>${data.bio}</p>

        <h2>Education</h2>
        ${data.education.map(e =>
          `<p><b>${e.degree}</b>, ${e.institution} (${e.year})</p>`
        ).join('')}
      </div>

      <div class="right">
        <div class="card">
          <h3>Research Focus</h3>
          <ul>
            ${data.research_interests.map(r => `<li>${r}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>
  `;
  document.getElementById("overview").innerHTML = html;
}

function loadPublications() {
  let html = `
    <div class="container">
      <h1>Publications</h1>
      <ul>
        ${data.publications.map(p =>
          `<li>${p.text}</li>`
        ).join('')}
      </ul>
    </div>
  `;
  document.getElementById("publications").innerHTML = html;
}
</script>

</body>
</html>
