<!DOCTYPE html>
<html>
<head>
  <title>CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cv"></div>

<script>
fetch('cv.json')
.then(res => res.json())
.then(data => {

  let html = `
    <h1>${data.name}</h1>
    <p>${data.email}</p>

    <h2>RESEARCH INTERESTS</h2>
    <p>${data.bio}</p>

    <h2>EDUCATION</h2>
    <ul>
      ${data.education.map(e =>
        `<li>${e.degree}, ${e.institution} (${e.year})</li>`
      ).join('')}
    </ul>

    <h2>PROJECTS</h2>
    <ul>
      ${data.projects.map(p =>
        `<li><b>${p.title}</b>: ${p.description}</li>`
      ).join('')}
    </ul>

    <h2>SKILLS</h2>
    <ul>
      ${data.skills.map(s =>
        `<li>${s}</li>`
      ).join('')}
    </ul>
  `;

  document.getElementById('cv').innerHTML = html;
});
</script>

</body>
</html>
