<!DOCTYPE html>
<html>
<head>
  <title>Saikat Sarkar Shraban - CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cv"></div>

<script>
fetch('cv.json')
.then(res => res.json())
.then(data => {

  let html = `
    <h1>${data.name}</h1>
    <p>${data.email}</p>
    <p>${data.bio}</p>

    <h2>RESEARCH INTERESTS</h2>
    <ul>
      ${data.research_interests.map(r =>
        `<li>${r}</li>`
      ).join('')}
    </ul>

    <h2>EDUCATION</h2>
    <ul>
      ${data.education.map(e =>
        `<li>
          <b>${e.degree}</b>, ${e.institution} (${e.year})<br>
          ${e.details}
        </li>`
      ).join('')}
    </ul>

    <h2>EXPERIENCE</h2>
    <ul>
      ${data.experience.map(e =>
        `<li>
          <b>${e.role}</b>, ${e.place} (${e.time})
          <ul>
            ${e.details.map(d => `<li>${d}</li>`).join('')}
          </ul>
        </li>`
      ).join('')}
    </ul>

    <h2>PUBLICATIONS</h2>
    <ul>
      ${data.publications.map(p =>
        `<li><b>[${p.type}]</b> ${p.text}</li>`
      ).join('')}
    </ul>

    <h2>SKILLS</h2>
    <ul>
      ${data.skills.map(s =>
        `<li>${s}</li>`
      ).join('')}
    </ul>
  `;

  document.getElementById('cv').innerHTML = html;
});
</script>

</body>
</html>
